services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_gateway
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rust-proxy:
    image: ai-gateway-rs:latest
    ports:
      - "2887:2887"
    environment:
      # Database & Redis
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@db:5432/ai_gateway
      - REDIS_URL=redis://redis:6379/0
      # Auth & Encryption
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # DingTalk OAuth
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET}
      - DINGTALK_CLIENT_ID=${DINGTALK_CLIENT_ID}
      # CORS & URLs
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      # Rate Limit
      - RATE_LIMIT_USER_QPS=10
      - RATE_LIMIT_PROVIDER_QPS=100
      # JWT
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      # Default Quota (CNY)
      - DEFAULT_QUOTA_AMOUNT=50.0
      # Prompt Audit Mode
      - PROMPT_SAVE_MODE=masked
      # Debug
      - DEBUG=${DEBUG}
      # Listen address
      - LISTEN_ADDR=0.0.0.0:2887
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2887/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: ai-gateway-frontend:latest
    ports:
      - "3000:80"
    environment:
      # Point API requests to the Rust backend (same port 2887)
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - rust-proxy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
