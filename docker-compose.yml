services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ai_gateway
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/ai_gateway}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC:-postgresql://postgres:postgres@db:5432/ai_gateway}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key-min-32-chars}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-32-byte-key!!}
      - DINGTALK_CORP_ID=${DINGTALK_CORP_ID:-}
      - DINGTALK_APP_ID=${DINGTALK_APP_ID:-}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET:-}
      - DINGTALK_AGENT_ID=${DINGTALK_AGENT_ID:-}
      - DEBUG=${DEBUG:-false}
      - FRONTEND_URL=${FRONTEND_URL:-https://dsapi.surebestind.com}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:2887,https://dsapi.surebestind.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  rust-proxy:
    build:
      context: ./backend-rs
      dockerfile: Dockerfile
    ports:
      - "2887:2887"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/ai_gateway}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key-min-32-chars}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-32-byte-key!!}
      - LISTEN_ADDR=0.0.0.0:2887
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
      - rust-proxy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
