services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ai_gateway
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rust-proxy:
    build:
      context: ./backend-rs
      dockerfile: Dockerfile
    ports:
      - "2887:2887"
    environment:
      # Database & Redis
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_gateway
      - REDIS_URL=redis://redis:6379/0
      # Auth & Encryption
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key-min-32-chars}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-32-byte-key!!}
      # DingTalk OAuth
      - DINGTALK_APP_ID=${DINGTALK_APP_ID:-}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET:-}
      - DINGTALK_AGENT_ID=${DINGTALK_AGENT_ID:-}
      # CORS & URLs
      - FRONTEND_URL=${FRONTEND_URL:-https://dsapi.surebestind.com}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:2887,https://dsapi.surebestind.com
      # Rate Limit
      - RATE_LIMIT_USER_QPS=10
      - RATE_LIMIT_PROVIDER_QPS=100
      # JWT
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      # Default Quota (CNY)
      - DEFAULT_QUOTA_AMOUNT=50.0
      # Prompt Audit Mode
      - PROMPT_SAVE_MODE=off
      # Debug
      - DEBUG=${DEBUG:-false}
      # Listen address
      - LISTEN_ADDR=0.0.0.0:2887
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      # Point API requests to the Rust backend (same port 2887)
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    depends_on:
      - rust-proxy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
